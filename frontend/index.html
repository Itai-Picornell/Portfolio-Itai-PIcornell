<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!--
        Title y meta tags (description, og, twitter, canonical, hreflang) son
        inyectados dinámicamente por @unhead/vue en cada ruta pre-renderizada.
        Los valores que aparecen aquí actúan como fallback antes de la hidratación.
    -->
    <title>Itai Picornell — Portfolio</title>
    <meta name="description"
        content="Portfolio of Itai Picornell. Passionate about cloud architecture and cybersecurity. CompTIA Security+ certified, currently preparing for the AWS Solutions Architect Associate." />
    <meta name="keywords" content="Itai Picornell, Cloud Architecture, Cybersecurity, AWS, CompTIA Security+, AWS Solutions Architect Associate, Cloud Security, Serverless, Portfolio" />
    <meta name="author" content="Itai Picornell" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <link rel="icon" type="image/jpeg" href="/Perfil.jpg" />

    <!--
        Structured data: Person.
        Idéntica en todas las rutas; describe a la persona, no a la página.
        sameAs refuerza la entidad "Itai Picornell" enlazando perfiles externos.
    -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Itai Picornell",
      "url": "https://portfolio.itaipicornell.com/",
      "image": "https://portfolio.itaipicornell.com/Perfil.jpg",
      "jobTitle": "Cloud & Cybersecurity Enthusiast",
      "description": "Passionate about cloud architecture and cybersecurity. CompTIA Security+ certified, currently preparing for the AWS Solutions Architect Associate.",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Palma",
        "addressRegion": "Illes Balears",
        "addressCountry": "ES"
      },
      "alumniOf": {
        "@type": "EducationalOrganization",
        "name": "FP Sant Josep Obrer"
      },
      "hasCredential": [
        {
          "@type": "EducationalOccupationalCredential",
          "name": "CompTIA Security+",
          "credentialCategory": "certification",
          "recognizedBy": {
            "@type": "Organization",
            "name": "CompTIA"
          },
          "url": "https://www.credly.com/badges/a1679f79-d6b5-4acc-b91c-5844e299497b"
        }
      ],
      "knowsAbout": [
        "Cloud Architecture",
        "Cybersecurity",
        "Amazon Web Services",
        "Serverless",
        "Cloud Security",
        "Infrastructure as Code",
        "Networking"
      ],
      "sameAs": [
        "https://www.linkedin.com/in/itaipicornell",
        "https://github.com/Itai-Picornell",
        "https://www.credly.com/badges/a1679f79-d6b5-4acc-b91c-5844e299497b"
      ]
    }
    </script>

    <!-- Structured data: WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Itai Picornell — Portfolio",
      "url": "https://portfolio.itaipicornell.com/",
      "author": {
        "@type": "Person",
        "name": "Itai Picornell"
      },
      "inLanguage": ["en", "es"]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" as="style" />

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet"
        media="print"
        onload="this.media='all'" />

    <noscript>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
            rel="stylesheet" />
    </noscript>
</head>

<body class="overflow-x-hidden">
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
