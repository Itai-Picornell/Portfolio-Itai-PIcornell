name: Deploy Portfolio to AWS S3 + CloudFront

# Disparador: se ejecuta en cada push a la rama 'main'
# Solo si hay cambios dentro de la carpeta 'frontend/' o en los workflows
on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/**"

# Permisos mínimos a nivel de workflow (principio de least-privilege).
#   - id-token: write → imprescindible para autenticarse con AWS vía OIDC
#   - contents: read  → para que el checkout pueda clonar el código
permissions:
  id-token: write
  contents: read

# Evita que dos deploys solapados se pisen entre sí.
# Si llega un push mientras hay otro deploy en curso, se encola (no se cancela)
# para no dejar S3 en un estado inconsistente.
concurrency:
  group: deploy-portfolio
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── Paso 1: Descarga el código del repositorio ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Paso 2: Configura Node.js 24 con caché de npm ──
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      # ── Paso 3: Instala dependencias de forma reproducible ──
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # ── Paso 4: Genera el build de producción optimizado ──
      # vite-ssg pre-renderiza /, /en y /es en dist/
      - name: Build for production
        working-directory: frontend
        run: npm run build

      # ── Paso 5: Autenticación contra AWS vía OIDC ──
      # No usa credenciales de larga duración. GitHub intercambia su JWT
      # firmado por credenciales temporales de STS (válidas ~1h).
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ── Paso 6: Sincroniza los assets estáticos con S3 ──
      # Se usa --delete para eliminar archivos obsoletos del bucket.
      # Los assets con hash (JS/CSS) se cachean por 1 año (immutable).
      # Excluimos los index.html porque tienen su propia política de caché.
      - name: Deploy static assets to S3
        run: |
          aws s3 sync frontend/dist/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "en/index.html" \
            --exclude "es/index.html"

      # ── Paso 7: Sube los HTML sin caché larga ──
      # Los index.html (uno por idioma) NUNCA deben cachearse para que los
      # cambios sean inmediatos en cuanto CloudFront se invalida.
      - name: Upload index.html files without cache
        run: |
          for path in "index.html" "en/index.html" "es/index.html"; do
            aws s3 cp "frontend/dist/${path}" "s3://${{ secrets.S3_BUCKET_NAME }}/${path}" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "text/html; charset=utf-8"
          done

      # ── Paso 8: Invalida la caché de CloudFront ──
      # Fuerza a CloudFront a servir los nuevos archivos en todos los edge locations.
      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
